<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Mate | Home</title>
<style>
  :root { --bg:#05070c; --card:#0d111a; --text:#f8fafc; --muted:#94a3b8; --accent:#f43f5e; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:var(--text)}
  header{position:sticky;top:0;background:rgba(5,7,12,.8);backdrop-filter:blur(10px);border-bottom:1px solid #1e293b;z-index:20}
.nav{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
.brand{font-weight:900;display:flex;align-items:center;gap:8px;color:var(--accent)}
.logo{width:24px;height:24px;border-radius:6px;background:var(--accent)}
.search{flex:1;display:flex}
.search input{flex:1;padding:10px 12px;border-radius:12px 0 0 12px;border:1px solid #1e293b;background:#0a0f17;color:var(--text)}
.search button{padding:10px 16px;border-radius:0 12px 12px 0;border:0;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
.user{color:var(--muted);font-size:14px}
.tabs{max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;gap:8px;overflow-x:auto}
.tab{padding:8px 14px;border-radius:999px;background:var(--card);border:1px solid #1e293b;color:var(--muted);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.card{background:var(--card);border:1px solid #1e293b;border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-4px);border-color:var(--accent)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.meta{padding:10px}
.title{font-size:14px;font-weight:700;line-height:1.3}
.sub{font-size:12px;color:var(--muted);margin-top:4px}
.loader{text-align:center;color:var(--muted);padding:40px}
</style>
</head>
<body>
<header>
  <nav class="nav">
    <div class="brand"><div class="logo"></div> Movie Mate</div>
    <div class="search">
      <input id="searchInput" placeholder="Search movies...">
      <button id="searchBtn">Search</button>
    </div>
    <div class="user" id="userName"></div>
  </nav>
</header>

<div class="tabs">
  <button class="tab active" data-endpoint="titles/x/upcoming">New</button>
  <button class="tab" data-endpoint="titles?genre=Action">Action</button>
  <button class="tab" data-endpoint="titles?genre=Animation">Cartoon</button>
  <button class="tab" data-endpoint="titles?genre=Comedy">Comedy</button>
  <button class="tab" data-endpoint="titles?genre=Drama">Drama</button>
  <button class="tab" data-endpoint="titles?genre=Romance">Romantic</button>
</div>

<main class="wrap">
  <div id="grid" class="grid"><div class="loader">Loading movies...</div></div>
</main>

<script>
const OMDB_KEY = "7906721e"; 
const RAPIDAPI_KEY = "idBjSQgIvS8J8NxmeLlhb0SlRljvUfIiKrPC8sGs"; // Your RapidAPI key
const RAPIDAPI_HOST = "moviesdatabase-reloaded.p.rapidapi.com";
const grid = document.getElementById('grid');

// Show signed-in user
const user = JSON.parse(localStorage.getItem('moviemate_user')||'{}');
document.getElementById('userName').textContent = user.name? `Hi, ${user.name}` : '';

async function fetchMovies(endpoint){
  grid.innerHTML = '<div class="loader">Loading...</div>';
  try{
    const res = await fetch(`https://${RAPIDAPI_HOST}/${endpoint}&limit=20`, {
      headers: {
        "X-RapidAPI-Key": RAPIDAPI_KEY,
        "X-RapidAPI-Host": RAPIDAPI_HOST
      }
    });
    const data = await res.json();
    renderMovies(data.results || []);
  }catch(e){
    grid.innerHTML = `<div class="loader">API limit hit or key error: ${e.message}</div>`;
  }
}

async function searchMovies(q){
  if(!q) return;
  grid.innerHTML = '<div class="loader">Searching...</div>';
  try{
    const res = await fetch(`http://www.omdbapi.com/?apikey=${OMDB_KEY}&s=${encodeURIComponent(q)}&type=movie`);
    const data = await res.json();
    if(data.Response === "False"){ grid.innerHTML='<div class="loader">No results</div>'; return; }

    const enriched = await Promise.all(data.Search.slice(0,20).map(async m=>{
      const dRes = await fetch(`http://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${m.imdbID}`);
      return dRes.json();
    }));
    renderMovies(enriched);
  }catch(e){
    grid.innerHTML = '<div class="loader">Search failed.</div>';
  }
}

function renderMovies(list){
  grid.innerHTML = '';
  if(!list || list.length===0){ grid.innerHTML='<div class="loader">No results</div>'; return; }

  list.forEach(m=>{
    const title = m.titleText?.text || m.Title;
    const year = m.releaseYear?.year || m.Year;
    const poster = m.primaryImage?.url || m.Poster || 'https://via.placeholder.com/300x450?text=No+Image';
    const rating = m.ratingsSummary?.aggregateRating || m.imdbRating? `IMDb ${m.ratingsSummary?.aggregateRating || m.imdbRating}` : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${poster}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
      <div class="meta">
        <div class="title">${title}</div>
        <div class="sub">${year||''} ${rating? '• '+rating : ''}</div>
      </div>`;
    grid.appendChild(card);
  });
}

// Tabs
document.querySelectorAll('.tab').forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    fetchMovies(btn.dataset.endpoint);
  }
});

// Search
document.getElementById('searchBtn').onclick = ()=>searchMovies(document.getElementById('searchInput').value);
document.getElementById('searchInput').addEventListener('keydown', e=>{ if(e.key==='Enter') searchMovies(e.target.value); });

// Default: New = Upcoming
fetchMovies('titles/x/upcoming');
</script>
</body>
</hhHom

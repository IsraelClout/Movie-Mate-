<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Mate </title>
<style>
  :root { --bg:#0b0f14; --card:#121821; --text:#eef2f7; --muted:#a7b1c2; --accent:#f5c518; --yt:#ff0000;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:var(--text)}
  header{position:sticky;top:0;background:rgba(11,15,20,.8);backdrop-filter:blur(10px);border-bottom:1px solid #1f2733;z-index:20}
  .nav{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
  .brand{font-weight:900;display:flex;align-items:center;gap:8px;color:var(--accent)}
  .search{flex:1;display:flex}
  .search input{flex:1;padding:10px 12px;border-radius:12px 0 0 12px;border:1px solid #263142;background:#0f1520;color:var(--text)}
  .search button{padding:10px 16px;border-radius:0 12px 12px 0;border:0;background:var(--accent);color:#000;font-weight:700;cursor:pointer}
  .tabs{max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;gap:8px;overflow-x:auto}
  .tab{padding:8px 14px;border-radius:999px;background:var(--card);border:1px solid #1f2733;color:var(--muted);cursor:pointer}
  .tab.active{background:var(--accent);color:#000}
  .wrap{max-width:1200px;margin:0 auto;padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid #1f2733;border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s}
  .card:hover{transform:translateY(-4px);border-color:var(--accent)}
  .card img{width:100%;aspect-ratio:2/3;object-fit:cover}
  .meta{padding:10px}.title{font-size:14px;font-weight:700}.sub{font-size:12px;color:var(--muted)}
  .loader{text-align:center;color:var(--muted);padding:40px}
  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal.active{display:flex}
  .modal-content{background:var(--card);border-radius:16px;max-width:900px;width:100%;padding:0;overflow:hidden;border:1px solid #1f2733}
  .modal-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
  .modal img{width:100%;border-radius:12px}
  .btn{padding:10px 14px;border-radius:8px;border:0;background:var(--yt);color:#fff;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
  .btn.ghost{background:var(--card);color:var(--text);border:1px solid #263142}
  .videoWrap{position:relative;padding-top:56.25%;background:#000}
  .videoWrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
  @media(max-width:800px){.modal-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <nav class="nav">
    <div class="brand">🎬 Movie Mate</div>
    <div class="search"><input id="searchInput" placeholder="Search any movie..."><button id="searchBtn">Search</button></div>
  </nav>
</header>

<div class="tabs">
  <button class="tab active" data-q="2025">New</button>
  <button class="tab" data-q="Action">Action</button>
  <button class="tab" data-q="Animation">Cartoon</button>
  <button class="tab" data-q="Comedy">Comedy</button>
</div>

<main class="wrap"><div id="grid" class="grid"><div class="loader">Search a movie to start</div></div></main>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="videoWrap" id="videoWrap"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const OMDB_KEY = "7906721e"; 
const YT_KEY = "AIzaSyDbfOhcqEcUX2pNfM4XP29kHGG3xVtkzfI"; // your key added
const OMDB_BASE = "https://www.omdbapi.com/";
const YT_BASE = "https://www.googleapis.com/youtube/v3/search";

const grid = document.getElementById('grid');
const modal = document.getElementById('modal');
const videoWrap = document.getElementById('videoWrap');
const modalBody = document.getElementById('modalBody');

async function searchMovies(q){
  grid.innerHTML = '<div class="loader">Loading...</div>';
  const res = await fetch(`${OMDB_BASE}?apikey=${OMDB_KEY}&s=${encodeURIComponent(q)}&type=movie`);
  const data = await res.json();
  if(data.Response === "False"){ grid.innerHTML='<div class="loader">No results</div>'; return; }
  const enriched = await Promise.all(data.Search.slice(0,18).map(m=>fetch(`${OMDB_BASE}?apikey=${OMDB_KEY}&i=${m.imdbID}`).then(r=>r.json())));
  renderMovies(enriched.filter(m=>m.Response!=="False"));
}

function renderMovies(list){
  grid.innerHTML = '';
  list.forEach(m=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="${m.Poster!=='N/A'?m.Poster:'https://via.placeholder.com/300x450'}" loading="lazy">
      <div class="meta"><div class="title">${m.Title}</div><div class="sub">${m.Year} • IMDb ${m.imdbRating||'N/A'}</div></div>`;
    card.onclick = () => openModal(m);
    grid.appendChild(card);
  });
}

async function getTrailerId(title, year){
  const q = `${title} ${year} Official Trailer`;
  const url = `${YT_BASE}?part=snippet&type=video&maxResults=1&q=${encodeURIComponent(q)}&key=${YT_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.items?.[0]?.id?.videoId || null;
}

async function openModal(m){
  modal.classList.add('active');
  videoWrap.innerHTML = '<div class="loader">Loading trailer...</div>';
  
  const trailerId = await getTrailerId(m.Title, m.Year);
  videoWrap.innerHTML = trailerId 
    ? `<iframe src="https://www.youtube.com/embed/${trailerId}?autoplay=1&rel=0" allow="autoplay; fullscreen"></iframe>`
    : `<div class="loader">No official trailer found on YouTube</div>`;

  modalBody.innerHTML = `
    <img src="${m.Poster!=='N/A'?m.Poster:'https://via.placeholder.com/300x450'}">
    <div>
      <h2>${m.Title} <span style="color:var(--muted)">(${m.Year})</span></h2>
      <p style="color:var(--muted)">${m.Genre} • ${m.Runtime} • IMDb ${m.imdbRating}</p>
      <p>${m.Plot}</p>
      <p><b>Cast:</b> ${m.Actors}</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn" onclick="window.open('https://www.imdb.com/title/${m.imdbID}','_blank')">IMDb</button>
        <button class="btn ghost" onclick="modal.classList.remove('active');videoWrap.innerHTML=''">Close</button>
      </div>
    </div>`;
}
modal.onclick = e => { if(e.target===modal) { modal.classList.remove('active'); videoWrap.innerHTML=''; } }

document.querySelectorAll('.tab').forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    searchMovies(btn.dataset.q);
  }
});
document.getElementById('searchBtn').onclick = ()=>searchMovies(document.getElementById('searchInput').value);
document.getElementById('searchInput').addEventListener('keydown', e=>{ if(e.key==='Enter') searchMovies(e.target.value); });

searchMovies('2025');
</script>
</body>
</html>
